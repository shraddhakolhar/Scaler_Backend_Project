# ===============================
# Service configuration
# ===============================
spring.application.name=${SPRING_APPLICATION_NAME:ORDER-SERVICE}
server.port=${SERVER_PORT:8483}

# ===============================
# Eureka client configuration
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# ===============================
# Database configuration
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/orderservicedb}
spring.datasource.username=${DB_USERNAME:orderservice}
spring.datasource.password=${DB_PASSWORD:S2011nppd}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.type=trace

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=${FLYWAY_ENABLED:true}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlMjU2Qml0S2V5MTIzNDU2}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# Kafka Producer
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=${KAFKA_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
spring.kafka.producer.value-serializer=${KAFKA_VALUE_SERIALIZER:org.springframework.kafka.support.serializer.JsonSerializer}

spring.kafka.producer.properties.spring.json.add.type.headers=false

# ===============================
# Logging & errors
# ===============================
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:TRACE}
server.error.include-message=always
server.error.include-binding-errors=always