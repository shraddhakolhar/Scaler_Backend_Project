# ===============================
# Service configuration
# ===============================
spring.application.name=${SPRING_APPLICATION_NAME:CART-SERVICE}
server.port=${SERVER_PORT:8383}

# ===============================
# Eureka client configuration
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# ===============================
# Database configuration
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cartservicedb}
spring.datasource.username=${DB_USERNAME:cartservice}
spring.datasource.password=${DB_PASSWORD:S2011nppd}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=${FLYWAY_ENABLED:true}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlMjU2Qml0S2V5MTIzNDU2}
jwt.expiration=${JWT_EXPIRATION:3600000}